<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - Pizza Express</title>
    <link rel="stylesheet" href="/cartStyles.css">
</head>
<body>
    <div class="cart-container">
        <!-- Header -->
        <div class="cart-header">
            <div class="cart-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="9" cy="21" r="1"></circle>
                    <circle cx="20" cy="21" r="1"></circle>
                    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                </svg>
                <span class="cart-badge">0</span>
            </div>
            <h1>Seu Carrinho</h1>
            <button class="close-btn" onclick="closeCart()">&times;</button>
        </div>

        <!-- Cart Items -->
        <div class="cart-items" id="cartItems">
            <!-- Items will be added here dynamically -->
            <div class="empty-cart">
                <p>Seu carrinho está vazio</p>
                <button class="add-item-btn" onclick="addNewItem()">
                    <span class="plus-icon">+</span>
                    Adicionar Item
                </button>
            </div>
        </div>

        <!-- Cart Item Template (hidden) -->
        <template id="cartItemTemplate">
            <div class="cart-item">
                <div class="item-info">
                    <h3 class="item-name">Pizza Margherita</h3>
                    <p class="item-details">Grande • Borda Fina</p>
                </div>
                <div class="item-controls">
                    <div class="quantity-control">
                        <button class="qty-btn" onclick="decreaseQty(this)">-</button>
                        <span class="quantity">1</span>
                        <button class="qty-btn" onclick="increaseQty(this)">+</button>
                    </div>
                    <span class="item-price">R$ 35,90</span>
                    <button class="remove-btn" onclick="removeItem(this)">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </template>

        <!-- Add More Button -->
        <div class="add-more-section">
            <button class="add-more-btn" onclick="addNewItem()">
                <span class="plus-circle">+</span>
                Adicionar mais itens
            </button>
        </div>

        <!-- Cart Summary -->
        <div class="cart-summary">
            <div class="summary-row">
                <span>Subtotal</span>
                <span id="subtotal">R$ 0,00</span>
            </div>
            <div class="summary-row">
                <span>Taxa de uso</span>
                <span id="deliveryFee">R$ 5,00</span>
            </div>
            <div class="summary-row total">
                <span>Total</span>
                <span id="total">R$ 0,00</span>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="cart-actions">
            <button class="btn-cancel" onclick="cancelOrder()">
                Cancelar Pedido
            </button>
            <button class="btn-order" onclick="doOrder()">
                Fazer Pedido
            </button>
        </div>
    </div>

    <script>
        function addNewItem() {
            const emptyCart = document.querySelector('.empty-cart');
            if (emptyCart) {
                emptyCart.remove();
            }
            
            const template = document.getElementById('cartItemTemplate');
            const clone = template.content.cloneNode(true);
            document.getElementById('cartItems').appendChild(clone);
            
            updateCartBadge();
            updateTotal();
        }

        function removeItem(btn) {
            btn.closest('.cart-item').remove();
            
            const items = document.querySelectorAll('.cart-item');
            if (items.length === 0) {
                document.getElementById('cartItems').innerHTML = `
                    <div class="empty-cart">
                        <p>Your cart is empty</p>
                        <button class="add-item-btn" onclick="addNewItem()">
                            <span class="plus-icon">+</span>
                            Add Item
                        </button>
                    </div>
                `;
            }
            
            updateCartBadge();
            updateTotal();
        }

        function increaseQty(btn) {
            const qtySpan = btn.previousElementSibling;
            let qty = parseInt(qtySpan.textContent);
            qtySpan.textContent = qty + 1;
            updateCartBadge();
            updateTotal();
        }

        function decreaseQty(btn) {
            const qtySpan = btn.nextElementSibling;
            let qty = parseInt(qtySpan.textContent);
            if (qty > 1) {
                qtySpan.textContent = qty - 1;
                updateCartBadge();
                updateTotal();
            }
        }

        function updateCartBadge() {
            const items = document.querySelectorAll('.cart-item');
            let totalQty = 0;
            items.forEach(item => {
                const qty = parseInt(item.querySelector('.quantity').textContent);
                totalQty += qty;
            });
            document.querySelector('.cart-badge').textContent = totalQty;
        }

        function updateTotal() {
            const items = document.querySelectorAll('.cart-item');
            let subtotal = 0;
            
            items.forEach(item => {
                const qty = parseInt(item.querySelector('.quantity').textContent);
                const priceText = item.querySelector('.item-price').textContent;
                const price = parseFloat(priceText.replace('R$ ', '').replace(',', '.'));
                subtotal += qty * price;
            });
            
            const deliveryFee = items.length > 0 ? 5.00 : 0;
            const total = subtotal + deliveryFee;
            
            document.getElementById('subtotal').textContent = `R$ ${subtotal.toFixed(2).replace('.', ',')}`;
            document.getElementById('deliveryFee').textContent = `R$ ${deliveryFee.toFixed(2).replace('.', ',')}`;
            document.getElementById('total').textContent = `R$ ${total.toFixed(2).replace('.', ',')}`;
        }

        function doOrder() {
            const items = document.querySelectorAll('.cart-item');
            if (items.length === 0) {
                alert('Your cart is empty! Add items before placing an order.');
                return;
            }
            alert('Order placed successfully! 🍕');
            // Add your order logic here
        }

        function cancelOrder() {
            if (confirm('Are you sure you want to cancel your order?')) {
                document.getElementById('cartItems').innerHTML = `
                    <div class="empty-cart">
                        <p>Your cart is empty</p>
                        <button class="add-item-btn" onclick="addNewItem()">
                            <span class="plus-icon">+</span>
                            Add Item
                        </button>
                    </div>
                `;
                updateCartBadge();
                updateTotal();
            }
        }

        function closeCart() {
            // Add logic to close the cart modal/page
            window.history.back();
        }
    </script>
</body>
</html>
