<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro - Pizza Express</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body{
    background:#f4f1f1;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:100%;
    max-width:450px;
    background:#fff;
    padding:40px;
    border-radius:20px;
    box-shadow:0 5px 20px rgba(0,0,0,.1);
}

.logo{
    text-align:center;
    margin-bottom:25px;
}

.logo h1{
    color:#e71d24;
    font-size:2.2rem;
}

.logo p{
    color:#666;
    margin-top:5px;
}

.form-group{
    margin-bottom:18px;
}

.form-group label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
    color:#333;
}

.form-group input{
    width:100%;
    padding:14px;
    border:1px solid #dcdcdc;
    border-radius:12px;
    font-size:16px;
    outline:none;
    transition:0.3s;
}

.form-group input:focus{
    border-color:#e71d24;
}

.btn-cadastrar{
    width:100%;
    padding:15px;
    border:none;
    border-radius:30px;
    background:#e71d24;
    color:#fff;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.btn-cadastrar:hover{
    background:#c5161d;
}

.login-link{
    text-align:center;
    margin-top:20px;
    color:#666;
}

.login-link a{
    color:#e71d24;
    text-decoration:none;
    font-weight:bold;
}

.login-link a:hover{
    text-decoration:underline;
}

.icone{
    font-size:40px;
}
</style>
</head>

<body>

<div class="container">

    <div class="logo">
        <div class="icone">🍕</div>
        <h1>Pizza Express</h1>
        <p>Crie sua conta e faça seus pedidos</p>
    </div>

    <form>

        <div class="form-group">
            <label>Nome Completo</label>
            <input type="text" placeholder="Digite seu nome">
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" placeholder="Digite seu email">
        </div>

        <div class="form-group">
            <label>Telefone</label>
            <input type="tel" placeholder="(00) 00000-0000">
        </div>

        <div class="form-group">
            <label>Senha</label>
            <input type="password" placeholder="Crie uma senha">
        </div>

        <div class="form-group">
            <label>Confirmar Senha</label>
            <input type="password" placeholder="Repita sua senha">
        </div>

        <button type="submit" class="btn-cadastrar">
            Cadastrar
        </button>

    </form>

    <div class="login-link">
        Já possui uma conta?
        <a onclick="window.location.href='login'">Entrar</a>
    </div>

</div>

</body>
</html>
