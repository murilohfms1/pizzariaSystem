<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - Pizza Express</title>
    <link rel="stylesheet" href="/cartStyles.css">
</head>
<body>
    <div class="cart-container">
        <!-- Header -->
        <div class="cart-header">
            <div class="cart-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="9" cy="21" r="1"></circle>
                    <circle cx="20" cy="21" r="1"></circle>
                    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                </svg>
                <span class="cart-badge">0</span>
            </div>
            <h1>Seu Carrinho</h1>
            <button class="close-btn" onclick="closeCart()">&times;</button>
        </div>

        <!-- Cart Items -->
        <div class="cart-items" id="cartItems">
            <!-- Items will be added here dynamically -->
            <div class="empty-cart">
                <p>Seu carrinho está vazio</p>
                <button class="add-item-btn" onclick="addNewItem()">
                    <span class="plus-icon">+</span>
                    Adicionar Item
                </button>
            </div>
        </div>
        <!-- Add More Button -->
        <div class="add-more-section">
            <button class="add-more-btn" onclick="window.location.href='menu'">
                <span class="plus-circle">+</span>
                Adicionar mais itens
            </button>
        </div>

        <!-- Cart Summary -->
        <div class="cart-summary">
            <div class="summary-row">
                <span>Subtotal</span>
                <span id="subtotal">R$ 0,00</span>
            </div>
            <div class="summary-row">
                <span>Taxa de uso</span>
                <span id="deliveryFee">R$ 5,00</span>
            </div>
            <div class="summary-row total">
                <span>Total</span>
                <span id="total">R$ 0,00</span>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="cart-actions">
            <button class="btn-cancel" onclick="cancelOrder()">
                Cancelar Pedido
            </button>
            <button class="btn-order" onclick="doOrder()">
                Fazer Pedido
            </button>
        </div>
    </div>

    <script>

        document.addEventListener('DOMContentLoaded', () => {
            carregarCarrinho();
            atualizarBadge();
        });

        function getCarrinho() {
            return JSON.parse(localStorage.getItem('carrinho')) || [];
        }

        function salvarCarrinho(carrinho) {
            localStorage.setItem('carrinho', JSON.stringify(carrinho));
        }

        /* =========================
        CARREGAR CARRINHO
        ========================= */
        function carregarCarrinho() {

            const carrinho = getCarrinho();
            const container = document.getElementById('cartItems');

            container.innerHTML = '';

            if (carrinho.length === 0) {
                container.innerHTML = `
                    <div class="empty-cart">
                        <p>Seu carrinho está vazio</p>
                    </div>
                `;

                atualizarResumo();
                atualizarBadge();
                return;
            }

            carrinho.forEach(item => {

                container.innerHTML += `
                    <div class="cart-item" data-id="${item.id}">

                        <div class="item-info">
                            <h3 class="item-name">${item.nome}</h3>
                        </div>

                        <div class="item-controls">

                            <div class="quantity-control">
                                <button onclick="diminuir(${item.id})">-</button>
                                <span>${item.quantidade}</span>
                                <button onclick="aumentar(${item.id})">+</button>
                            </div>

                            <span class="item-price">
                                R$ ${(item.preco * item.quantidade).toFixed(2).replace('.', ',')}
                            </span>

                            <button onclick="remover(${item.id})">🗑️</button>

                        </div>

                    </div>
                `;
            });

            atualizarResumo();
            atualizarBadge();
        }

        /* =========================
        AUMENTAR QTD
        ========================= */
        function aumentar(id) {

            let carrinho = getCarrinho();

            const item = carrinho.find(p => Number(p.id) === Number(id));

            if (item) {
                item.quantidade++;
            }

            salvarCarrinho(carrinho);
            carregarCarrinho();
        }

        /* =========================
        DIMINUIR QTD
        ========================= */
        function diminuir(id) {

            let carrinho = getCarrinho();

            const item = carrinho.find(p => Number(p.id) === Number(id));

            if (!item) return;

            item.quantidade--;

            if (item.quantidade <= 0) {
                carrinho = carrinho.filter(p => Number(p.id) !== Number(id));
            }

            salvarCarrinho(carrinho);
            carregarCarrinho();
        }

        /* =========================
        REMOVER ITEM
        ========================= */
        function remover(id) {

            let carrinho = getCarrinho();

            carrinho = carrinho.filter(p => Number(p.id) !== Number(id));

            salvarCarrinho(carrinho);
            carregarCarrinho();
        }

        /* =========================
        BADGE (contador)
        ========================= */
        function atualizarBadge() {

            const carrinho = getCarrinho();

            const total = carrinho.reduce(
                (soma, item) => soma + item.quantidade,
                0
            );

            const badge = document.querySelector('.cart-badge');

            if (badge) {
                badge.textContent = total;
            }
        }

        /* =========================
        RESUMO (subtotal/taxa/total)
        ========================= */
        function atualizarResumo() {

            const carrinho = getCarrinho();

            let subtotal = 0;

            carrinho.forEach(item => {
                subtotal += item.preco * item.quantidade;
            });

            const taxa = carrinho.length > 0 ? 5 : 0;

            const total = subtotal + taxa;

            document.getElementById('subtotal').textContent =
                `R$ ${subtotal.toFixed(2).replace('.', ',')}`;

            document.getElementById('deliveryFee').textContent =
                `R$ ${taxa.toFixed(2).replace('.', ',')}`;

            document.getElementById('total').textContent =
                `R$ ${total.toFixed(2).replace('.', ',')}`;
        }

        /* =========================
        FINALIZAR PEDIDO
        ========================= */
        function doOrder() {

            const carrinho = getCarrinho();

            if (carrinho.length === 0) {
                alert('Seu carrinho está vazio!');
                return;
            }

            alert('Pedido realizado com sucesso! 🍕');

            localStorage.removeItem('carrinho');

            carregarCarrinho();
        }

        /* =========================
        CANCELAR PEDIDO
        ========================= */
        function cancelOrder() {
            if (!confirm('Deseja cancelar o pedido?')) return;

            localStorage.removeItem('carrinho');

            // força sincronização entre páginas
            window.dispatchEvent(new Event('storage'));

            alert('Pedido cancelado!');
        }

        function closeCart() {
            window.history.back();
        }

        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) {
                atualizarContadorCarrinho();
            }
        });
    </script>
</body>
</html>
