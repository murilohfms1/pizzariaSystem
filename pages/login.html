<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Pizza Express</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body{
    background:#f5f2f2;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-container{
    background:white;
    width:400px;
    padding:40px;
    border-radius:20px;
    box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

.legal{
    cursor: pointer;
}

.logo{
    text-align:center;
    margin-bottom:30px;
}

.logo h1{
    color:#e52421;
    font-size:2rem;
}

.logo p{
    color:#666;
    margin-top:5px;
}

.form-group{
    margin-bottom:20px;
}

.form-group label{
    display:block;
    margin-bottom:8px;
    color:#222;
    font-weight:bold;
}

.form-group input{
    width:100%;
    padding:14px;
    border:1px solid #ddd;
    border-radius:10px;
    font-size:1rem;
    outline:none;
    transition:0.3s;
}

.form-group input:focus{
    border-color:#e52421;
}

.login-btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:30px;
    background:#e52421;
    color:white;
    font-size:1rem;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.login-btn:hover{
    opacity:0.9;
}

.extra-links{
    margin-top:20px;
    text-align:center;
}

.extra-links a{
    text-decoration:none;
    color:#e52421;
    font-size:0.95rem;
    cursor: pointer;
}

.extra-links p{
    margin-top:10px;
    color:#666;
}

</style>
</head>

<body>

<div class="login-container">

    <div class="logo">
        <h1>🍕 Pizza Express</h1>
        <p>Acesse sua conta - Faça pedidos!</p>
    </div>

    <form>

        <div class="form-group">
            <label>Email</label>
            <input type="email" placeholder="Digite seu email">
        </div>

        <div class="form-group">
            <label>Senha</label>
            <input type="password" placeholder="Digite sua senha">
        </div>

        <button type="submit" class="login-btn">
            Entrar
        </button>

    </form>

    <div class="extra-links">
        <a onclick="window.location.href='pwdreset'">Esqueci minha senha</a>

        <p>
            Não possui conta?
            <a onclick="window.location.href='newAccount'" class="legal">Cadastre-se</a>
        </p>
    </div>

</div>

</body>
</html>
